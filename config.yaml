# QoT Simulation Configuration
# LEO Satellite Optical Network with OXC Architecture

constellation:
  N_planes: 12
  sats_per_plane: 11
  F: 1
  altitude_km: 550.0
  inclination_deg: 53.0

physical_layer:
  channel_spacing_GHz: 25.0
  num_channels: 24
  carrier_freq_THz: 193.414
  data_rate_Gbps: 10.0
  tx_power_dBm: 30.0
  rx_aperture_diameter_mm: 80.0
  tx_divergence_angle_urad: 10.0
  optical_efficiency: 0.6
  pointing_loss_dB: 1.0
  oxc_insertion_loss_dB: 3.0
  oxc_isolation_dB: 30.0
  optical_filter_BW_GHz: 12.5
  demux_isolation_dB: 25.0
  rx_thermal_noise_dBm: -40.0
  osnr_ref_BW_GHz: 12.5
  rx_electrical_BW_GHz: 7.5

edfa:
  nominal_gain_dB: 20.0
  nominal_nf_dB: 5.0
  # Low-dose electron-irradiation calibration for inter-satellite EDFA:
  # about 0.5 dB output/gain loss and 1 dB NF increase at 5 krad.
  gain_degradation_slope: 0.10
  nf_degradation_slope: 0.20

saa_radiation:
  center_lat_deg: -25.0
  center_lon_deg: -45.0
  lat_window_deg: 15.0
  lon_window_deg: 30.0
  background_dose_rate_krad_yr: 0.1
  saa_enhancement_factor: 10.0

celestial:
  # Sun enters receiver FOV: affected/core region following Liu et al., ICC 2025.
  sun_avoidance_angle_deg: 3.0
  # Outside the FOV, solar background noise is extended as a smooth OSNR penalty tail.
  sun_coupling_scale_deg: 5.0
  sun_coupling_order: 4.0
  sun_spectral_radiance: 1.5e+6
  sky_spectral_radiance: 3.0e-4
  receiver_fov_sr: 1.0e-10

rwa:
  max_hops: 12
  use_fec: true
  ber_threshold_no_fec: 1.0e-12
  ber_threshold_with_fec: 2.0e-3
  # false: traditional shortest-path + first-fit RWA accepts any route with
  # an available wavelength, then reports QoT/BER performance after setup.
  # true: QoT constraints reject paths during setup.
  enforce_qot_constraints: false
  k_shortest_paths: 3
  max_cumulative_dose_krad: 50.0
  max_link_distance_km: 5400.0

simulation:
  time_step_s: 0.0
  earth_radius_km: 6371.0
  mission_age_years: 3.0
  path_duration_yr: 0.1
  # 0 disables post-establishment time-series QoT observation.
  qot_observation_duration_s: 0.0
  qot_observation_step_s: 60.0
